<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dust of Sound</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#000;
font-family:Arial, sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:100%;
height:100%;
background:
radial-gradient(circle at center,#222 0%,#000 70%);
animation:pulse 6s infinite;
}

.container{
position:relative;
z-index:2;
}

h1{
font-size:5rem;
letter-spacing:8px;
margin-bottom:20px;
}

p{
font-size:1.2rem;
opacity:.8;
margin-bottom:30px;
}

.line{
width:120px;
height:2px;
background:white;
margin:20px auto;
opacity:.4;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="container">
<h1>DUST OF SOUND</h1>
<div class="line"></div>
<p>Music • Emotion • Atmosphere</p>
<p>Official Website Coming Soon</p>
</div>

</body>
</html>
